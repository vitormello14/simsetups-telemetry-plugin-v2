name: Build SimSetups Telemetry Plugin

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "lib/**"
      - "*.csproj"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore SimSetups.TelemetryPlugin.csproj

      - name: Build (Release)
        run: dotnet build SimSetups.TelemetryPlugin.csproj --configuration Release --no-restore -p:Version=2.5.0

      - name: Locate built DLL
        id: locate
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Path . -Filter "SimSetups.TelemetryPlugin.dll" -Recurse -File |
                 Where-Object { $_.FullName -match "Release" } |
                 Select-Object -First 1
          if (-not $dll) { Write-Error "DLL not found in any Release folder"; exit 1 }
          Write-Host "Found: $($dll.FullName)"
          $outDir = "build-output"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          Copy-Item $dll.FullName -Destination "$outDir\SimSetups_TelemetryPlugin.dll"
          Write-Host "Copied to $outDir\SimSetups_TelemetryPlugin.dll"
          "dll_path=$outDir\SimSetups_TelemetryPlugin.dll" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimSetups_TelemetryPlugin-v2.5.0
          path: build-output/SimSetups_TelemetryPlugin.dll
          if-no-files-found: error
